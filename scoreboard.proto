syntax = "proto3";

package scoreboard;

message GetScoreRequest {
  string game_id = 1;
}

message GetScoreResponse {
  string game_id    = 1;
  int64  score      = 2;
  int64  version    = 3;
  string updated_by = 4;
  string timestamp  = 5;
}

message UpdateScoreRequest {
  string game_id      = 1;
  int64  new_score    = 2;
  int64  base_version = 3;
  string player_id    = 4;
}

message UpdateScoreResponse {
  bool   success      = 1;
  string message      = 2;
  int64  score        = 3;
  int64  version      = 4;
}

service ScoreboardService {
  rpc GetScore    (GetScoreRequest)    returns (GetScoreResponse);
  rpc UpdateScore (UpdateScoreRequest) returns (UpdateScoreResponse);
}
